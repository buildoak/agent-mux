[defaults]
timeout_low = 180
timeout_medium = 900
timeout_high = 2400
timeout_xhigh = 5400
sandbox = "workspace-write"

[liveness]
silence_warn = 180
silence_kill = 420
heartbeat_interval_sec = 20
silence_warn_seconds = 180
silence_kill_seconds = 420

[timeout]
low = 180
medium = 900
high = 2400
xhigh = 5400
grace = 120

[pipelines.build]
max_parallel = 4

[[pipelines.build.steps]]
name = "scaffold"
effort = "medium"
timeout = 600
pass_output_as = "scaffold_output"

[[pipelines.build.steps]]
name = "implement"
effort = "high"
timeout = 1800
receives = "scaffold_output"
pass_output_as = "implementation_output"

[[pipelines.build.steps]]
name = "audit"
effort = "xhigh"
timeout = 2400
receives = "implementation_output"
